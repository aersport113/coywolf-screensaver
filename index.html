<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coywolf Aviation — Avionics Division</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange:      #E07820;
    --orange-dim:  rgba(224,120,32,0.5);
    --orange-glow: rgba(224,120,32,0.14);
    --dark:        #0A0A0A;
    --text:        #D8D8D8;
    --text-dim:    rgba(216,216,216,0.4);
    --text-faint:  rgba(216,216,216,0.16);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    cursor: none;
  }

  /* ── Starfield ── */
  #starfield { position: fixed; inset: 0; z-index: 0; }

  /* ── Ghost wolf watermark — bottom right, large ── */
  .ghost-wolf {
    position: fixed;
    right: -4vw;
    bottom: -4vh;
    width: clamp(340px, 48vw, 780px);
    height: auto;
    z-index: 2;
    opacity: 0.07;
    filter: grayscale(100%) contrast(1.4);
    pointer-events: none;
    animation: ghostDrift 18s ease-in-out infinite;
    transform-origin: bottom right;
  }
  @keyframes ghostDrift {
    0%,100% { opacity: 0.07; transform: scale(1) translateY(0); }
    50%      { opacity: 0.10; transform: scale(1.02) translateY(-12px); }
  }

  /* ── Atmosphere glow ── */
  .atmo {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 42vh; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 80% 65% at 50% 100%,
      rgba(224,120,32,0.11) 0%, rgba(224,120,32,0.04) 50%, transparent 100%);
  }

  /* ── Perspective grid ── */
  #grid-canvas {
    position: fixed; bottom: 0; left: 0;
    width: 100%; height: 52vh;
    z-index: 2; pointer-events: none;
  }

  /* ── Corner brackets ── */
  .bracket {
    position: fixed; width: 52px; height: 52px;
    z-index: 20; opacity: 0;
    animation: fadeIn 1.8s 0.5s ease forwards;
  }
  .bracket.tl { top: 28px; left: 28px;
    border-top: 1px solid var(--orange-dim); border-left: 1px solid var(--orange-dim); }
  .bracket.tr { top: 28px; right: 28px;
    border-top: 1px solid var(--orange-dim); border-right: 1px solid var(--orange-dim); }
  .bracket.bl { bottom: 28px; left: 28px;
    border-bottom: 1px solid var(--orange-dim); border-left: 1px solid var(--orange-dim); }
  .bracket.br { bottom: 28px; right: 28px;
    border-bottom: 1px solid var(--orange-dim); border-right: 1px solid var(--orange-dim); }

  /* ── Clock ── */
  .clock-wrap {
    position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
    z-index: 20; text-align: center;
    opacity: 0; animation: fadeIn 1.8s 0.8s ease forwards;
  }
  .clock-time {
    font-size: clamp(22px, 3.2vw, 50px);
    font-weight: 200; letter-spacing: 0.14em;
    color: rgba(216,216,216,0.92);
    font-variant-numeric: tabular-nums;
  }
  .clock-date {
    margin-top: 5px;
    font-size: clamp(8px, 0.85vw, 12px);
    letter-spacing: 0.48em;
    color: var(--orange);
    text-transform: uppercase;
  }

  /* ── HUD panels ── */
  .hud {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 20; display: flex; flex-direction: column;
    gap: clamp(14px, 2.2vh, 30px);
    opacity: 0; animation: fadeIn 2s 1.4s ease forwards;
  }
  .hud.left  { left: clamp(32px, 5vw, 72px);  align-items: flex-start; }
  .hud.right { right: clamp(32px, 5vw, 72px); align-items: flex-end; }

  .hud-item { display: flex; flex-direction: column; gap: 3px; }
  .hud-item.ra { align-items: flex-end; }

  .hud-label {
    font-size: clamp(7px, 0.7vw, 10px);
    letter-spacing: 0.4em; color: var(--orange-dim);
    text-transform: uppercase;
  }
  .hud-value {
    font-size: clamp(15px, 1.8vw, 26px);
    font-weight: 300; letter-spacing: 0.06em;
    color: rgba(216,216,216,0.9);
    font-variant-numeric: tabular-nums;
  }
  .hud-value.mono {
    font-family: 'Consolas','Courier New',monospace;
    font-size: clamp(12px, 1.3vw, 18px);
  }
  .hud-value.active { color: #5FCF72; }

  .hud-rule { width: clamp(48px,7vw,110px); height: 1px; margin-top: 2px; }
  .hud.left  .hud-rule { background: linear-gradient(90deg,  var(--orange-dim), transparent); }
  .hud.right .hud-rule { background: linear-gradient(270deg, var(--orange-dim), transparent); }

  /* ── Centre logo ── */
  .centre {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .logo-rig {
    position: relative;
    width: clamp(200px, 26vw, 420px);
    height: clamp(200px, 26vw, 420px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    animation: riseIn 2s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  @keyframes riseIn {
    0%   { opacity: 0; transform: translateY(28px) scale(0.93); }
    100% { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* Rotating rings */
  .ring-outer, .ring-inner {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .ring-outer { animation: spin 22s linear infinite; }
  .ring-inner { animation: spin 34s linear infinite reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Glow behind logo */
  .logo-glow {
    position: absolute; inset: -12%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224,120,32,0.18) 0%, transparent 66%);
    animation: breathe 4s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes breathe {
    0%,100% { transform: scale(0.88); opacity: 0.55; }
    50%      { transform: scale(1.14); opacity: 1; }
  }

  /* Logo image — dark bg version, fits naturally */
  .logo-img {
    position: relative; z-index: 3;
    width: 72%; height: auto;
    /* No filter — the image already has dark bg */
  }

  /* Brand text below logo */
  .brand {
    margin-top: clamp(10px, 2vw, 28px);
    text-align: center;
    opacity: 0; animation: fadeIn 1.8s 1s ease forwards;
  }
  .brand-sub {
    font-size: clamp(9px, 1.05vw, 15px);
    letter-spacing: 0.55em;
    color: var(--orange);
    text-transform: uppercase;
    font-weight: 400;
  }
  .brand-tagline {
    margin-top: clamp(5px, 0.8vh, 12px);
    font-size: clamp(7px, 0.75vw, 10px);
    letter-spacing: 0.32em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* ── Runway ── */
  .runway-line {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 1px; z-index: 3;
    background: linear-gradient(90deg,
      transparent 4%, rgba(224,120,32,0.3) 22%,
      rgba(224,120,32,0.65) 50%, rgba(224,120,32,0.3) 78%, transparent 96%);
  }
  .runway-dots {
    position: fixed; bottom: 14px; left: 0; right: 0;
    z-index: 3; display: flex;
    justify-content: center; gap: clamp(18px, 3.2vw, 56px);
  }
  .rdot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--orange);
    animation: blink 2.8s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.18; } 50% { opacity: 0.82; }
  }

  /* ── Status bar ── */
  .status-bar {
    position: fixed; bottom: clamp(22px, 3.5vh, 44px);
    left: 50%; transform: translateX(-50%);
    z-index: 20;
    display: flex; gap: clamp(18px, 3vw, 50px); align-items: center;
    opacity: 0; animation: fadeIn 2s 2s ease forwards;
    white-space: nowrap;
  }
  .sitem {
    display: flex; align-items: center; gap: 7px;
    font-size: clamp(7px, 0.72vw, 10px);
    letter-spacing: 0.24em; color: var(--text-faint);
    text-transform: uppercase;
  }
  .sdot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    animation: blink 2.2s ease-in-out infinite;
  }
  .sdot.g { background: #5FCF72; animation-delay: 0.2s; }
  .sdot.o { background: var(--orange); animation-delay: 0.55s; }
  .sdot.a { background: #FFC107; animation-delay: 0.9s; }

  /* ── Scanlines ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 25; pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.032) 3px, rgba(0,0,0,0.032) 4px
    );
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 760px) {
    .hud { display: none; }
    .ghost-wolf { width: 85vw; opacity: 0.06; }
  }
</style>
</head>

<script>
(function () {

  // Runway dots
  const rdWrap = document.getElementById('rdots');
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'rdot';
    d.style.animationDelay = (i * 0.18) + 's';
    rdWrap.appendChild(d);
  }

  // ── Starfield ──────────────────────────────────────────────────────────────
  const sc   = document.getElementById('starfield');
  const sctx = sc.getContext('2d');
  let stars  = [];

  function initStars() {
    sc.width  = window.innerWidth;
    sc.height = window.innerHeight;
    stars = [];
    const n = Math.floor(sc.width * sc.height / 5600);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * sc.width,
        y: Math.random() * sc.height * 0.76,
        r: Math.random() * 1.5 + 0.15,
        base: Math.random() * 0.65 + 0.1,
        spd: Math.random() * 0.005 + 0.0018,
        ph: Math.random() * Math.PI * 2
      });
    }
  }

  let t = 0;
  function drawStars() {
    sctx.clearRect(0, 0, sc.width, sc.height);
    t += 0.016;
    stars.forEach(s => {
      const a = s.base * (0.52 + 0.48 * Math.sin(t * s.spd * 60 + s.ph));
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sctx.fillStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')';
      sctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  // ── Grid ──────────────────────────────────────────────────────────────────
  const gc   = document.getElementById('grid-canvas');
  const gctx = gc.getContext('2d');

  function drawGrid() {
    gc.width  = window.innerWidth;
    gc.height = window.innerHeight * 0.52;
    const W = gc.width, H = gc.height;
    const vx = W / 2;

    gctx.clearRect(0, 0, W, H);

    [0, 0.1, 0.2, 0.32, 0.44, 0.5, 0.56, 0.68, 0.8, 0.9, 1].forEach(f => {
      const bx = f * W;
      const g  = gctx.createLinearGradient(vx, 0, bx, H);
      g.addColorStop(0, 'rgba(224,120,32,0)');
      g.addColorStop(1, 'rgba(224,120,32,0.1)');
      gctx.beginPath();
      gctx.moveTo(vx, 0);
      gctx.lineTo(bx, H);
      gctx.strokeStyle = g;
      gctx.lineWidth = 0.7;
      gctx.stroke();
    });

    [0.88, 0.76, 0.62, 0.44, 0.22].forEach(f => {
      const y = f * H;
      const a = 0.035 + (1 - f) * 0.055;
      gctx.beginPath();
      gctx.moveTo(0, y); gctx.lineTo(W, y);
      gctx.strokeStyle = 'rgba(224,120,32,' + a + ')';
      gctx.lineWidth = 0.7;
      gctx.stroke();
    });
  }

  // ── Clock ─────────────────────────────────────────────────────────────────
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  function tick() {
    const n = new Date();
    const hh = String(n.getHours()).padStart(2,'0');
    const mm = String(n.getMinutes()).padStart(2,'0');
    const ss = String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clk').textContent = hh+':'+mm+':'+ss;
    document.getElementById('clk-date').textContent =
      DAYS[n.getDay()] + '  ·  ' + MONTHS[n.getMonth()] + ' ' +
      n.getDate() + ', ' + n.getFullYear();
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  let alt = 4200, spd = 138, hdg = 247;
  function updateHUD() {
    alt += Math.round((Math.random() - 0.5) * 18);
    spd += Math.round((Math.random() - 0.5) * 2);
    hdg  = ((hdg + Math.round((Math.random() - 0.5) * 1.5)) + 360) % 360;
    document.getElementById('hud-alt').textContent = alt.toLocaleString() + ' ft';
    document.getElementById('hud-spd').textContent = spd + ' kts';
    document.getElementById('hud-hdg').textContent = String(hdg).padStart(3,'0') + '°';
  }

  // ── Aircraft ──────────────────────────────────────────────────────────────
  function makePlane(sz, yFrac, delayMs, durMs, flip) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;z-index:8;opacity:0;pointer-events:none;top:'+(yFrac*100)+'vh;';
    if (flip) el.style.transform = 'scaleX(-1)';
    el.innerHTML =
      '<svg width="'+sz+'" height="'+Math.round(sz*0.38)+'" viewBox="0 0 70 26" fill="none">' +
        '<path d="M2 13 L26 7 L56 13 L70 11 L56 15 L26 19 L2 13Z" fill="rgba(255,255,255,0.32)"/>' +
        '<path d="M16 13 L30 3 L34 13" fill="rgba(255,255,255,0.24)"/>' +
        '<path d="M16 13 L30 23 L34 13" fill="rgba(255,255,255,0.15)"/>' +
        '<path d="M52 13 L60 9 L62 13 L60 17 L52 13Z" fill="rgba(255,255,255,0.24)"/>' +
        '<circle cx="67" cy="12" r="1.4" fill="rgba(224,120,32,0.9)"/>' +
      '</svg>';
    document.body.appendChild(el);

    function fly() {
      el.style.transition = 'none';
      el.style.left = '-10%'; el.style.opacity = '0';
      setTimeout(() => {
        el.style.transition = 'left '+durMs+'ms linear, opacity 1.8s ease';
        el.style.left = '110%'; el.style.opacity = '0.5';
        setTimeout(() => { el.style.opacity = '0'; }, durMs - 2200);
        setTimeout(fly, durMs + Math.random() * 14000 + 7000);
      }, 60);
    }
    setTimeout(fly, delayMs);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  function onResize() { initStars(); drawGrid(); }
  window.addEventListener('resize', onResize);
  onResize();
  requestAnimationFrame(drawStars);
  tick();
  setInterval(tick, 1000);
  setInterval(updateHUD, 3200);

  makePlane(66, 0.17, 4500,  24000, false);
  makePlane(48, 0.29, 13000, 30000, true);
  makePlane(56, 0.11, 21000, 21000, false);
  makePlane(42, 0.23, 32000, 27000, true);

})();
</script>
