<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coywolf Aviation — Avionics Division</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange:     #CF6010;
    --orange-mid: rgba(207,96,16,0.5);
    --dark:       #0A0A0A;
    --text:       #D2D2D2;
    --text-dim:   rgba(210,210,210,0.38);
    --text-faint: rgba(210,210,210,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0A0A0A;
    color: var(--text);
    font-family: 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    cursor: none;
  }

  #starfield { position: fixed; inset: 0; z-index: 0; }

  /* Ghost wolf — emblem large and very faint, bottom right */
  .ghost-emblem {
    position: fixed;
    right: -6vw; bottom: -8vh;
    width: clamp(280px, 40vw, 640px);
    height: auto;
    z-index: 1; pointer-events: none;
    opacity: 0.055;
    filter: grayscale(30%);
    animation: ghostBreathe 16s ease-in-out infinite;
    transform-origin: bottom right;
  }
  @keyframes ghostBreathe {
    0%,100% { opacity: 0.055; transform: scale(1); }
    50%      { opacity: 0.075; transform: scale(1.02) translateY(-10px); }
  }

  .atmo {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 42vh; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 80% 62% at 50% 100%,
      rgba(207,96,16,0.11) 0%, rgba(207,96,16,0.03) 50%, transparent 100%);
  }

  #grid-canvas {
    position: fixed; bottom: 0; left: 0;
    width: 100%; height: 52vh;
    z-index: 2; pointer-events: none;
  }

  /* Corner brackets */
  .bracket {
    position: fixed; width: 50px; height: 50px;
    z-index: 20; opacity: 0;
    animation: fadeIn 1.8s 0.5s ease forwards;
  }
  .bracket.tl { top: 26px; left: 26px;
    border-top: 1px solid var(--orange-mid); border-left: 1px solid var(--orange-mid); }
  .bracket.tr { top: 26px; right: 26px;
    border-top: 1px solid var(--orange-mid); border-right: 1px solid var(--orange-mid); }
  .bracket.bl { bottom: 26px; left: 26px;
    border-bottom: 1px solid var(--orange-mid); border-left: 1px solid var(--orange-mid); }
  .bracket.br { bottom: 26px; right: 26px;
    border-bottom: 1px solid var(--orange-mid); border-right: 1px solid var(--orange-mid); }

  /* Clock */
  .clock-wrap {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    z-index: 20; text-align: center;
    opacity: 0; animation: fadeIn 1.8s 0.8s ease forwards;
  }
  .clock-time {
    font-size: clamp(22px, 3.2vw, 50px);
    font-weight: 200; letter-spacing: 0.14em;
    color: rgba(210,210,210,0.92);
    font-variant-numeric: tabular-nums;
  }
  .clock-date {
    margin-top: 4px;
    font-size: clamp(8px, 0.85vw, 12px);
    letter-spacing: 0.48em; color: var(--orange);
    text-transform: uppercase;
  }

  /* HUD panels */
  .hud {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 20; display: flex; flex-direction: column;
    gap: clamp(14px, 2.2vh, 30px);
    opacity: 0; animation: fadeIn 2s 1.4s ease forwards;
  }
  .hud.left  { left:  clamp(30px, 4.8vw, 70px); align-items: flex-start; }
  .hud.right { right: clamp(30px, 4.8vw, 70px); align-items: flex-end; }

  .hud-item { display: flex; flex-direction: column; gap: 3px; }
  .hud-item.ra { align-items: flex-end; }
  .hud-label {
    font-size: clamp(7px, 0.7vw, 10px);
    letter-spacing: 0.4em; color: var(--orange-mid);
    text-transform: uppercase;
  }
  .hud-value {
    font-size: clamp(15px, 1.8vw, 26px);
    font-weight: 300; letter-spacing: 0.06em;
    color: rgba(210,210,210,0.9);
    font-variant-numeric: tabular-nums;
  }
  .hud-value.mono {
    font-family: 'Consolas','Courier New',monospace;
    font-size: clamp(12px, 1.3vw, 18px);
  }
  .hud-value.ok { color: #5FCF72; }
  .hud-rule { width: clamp(46px, 6.8vw, 105px); height: 1px; margin-top: 2px; }
  .hud.left  .hud-rule { background: linear-gradient(90deg,  var(--orange-mid), transparent); }
  .hud.right .hud-rule { background: linear-gradient(270deg, var(--orange-mid), transparent); }

  /* Centre */
  .centre {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .logo-rig {
    position: relative;
    width: clamp(220px, 26vw, 420px);
    height: clamp(220px, 26vw, 420px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    animation: riseIn 2s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(26px) scale(0.93); }
    to   { opacity: 1; transform: none; }
  }

  .ring-a { position: absolute; inset: 0; animation: spin 22s linear infinite; }
  .ring-b { position: absolute; inset: 0; animation: spin 36s linear infinite reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-glow {
    position: absolute; inset: -14%; border-radius: 50%;
    background: radial-gradient(circle, rgba(207,96,16,0.18) 0%, transparent 65%);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(0.88); opacity: 0.5; }
    50%      { transform: scale(1.12); opacity: 1; }
  }

  /* Emblem image — transparent bg, sits clean on dark */
  .emblem-img {
    position: relative; z-index: 3;
    width: 62%; height: auto;
  }

  /* Logo text block beneath emblem */
  .logo-text {
    position: relative; z-index: 3;
    margin-top: clamp(-8px, -1vw, -4px);
    text-align: center;
  }
  .logo-name {
    font-size: clamp(20px, 3vw, 46px);
    font-weight: 600; letter-spacing: 0.04em;
    color: #C8C8C8; line-height: 1;
  }
  .logo-avia {
    font-size: clamp(8px, 1vw, 15px);
    font-weight: 400; letter-spacing: 0.5em;
    color: var(--orange);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .brand {
    margin-top: clamp(14px, 2vw, 28px);
    text-align: center;
    opacity: 0; animation: fadeIn 1.8s 1s ease forwards;
  }
  .brand-sub {
    font-size: clamp(8px, 0.95vw, 13px);
    letter-spacing: 0.55em; color: var(--orange);
    text-transform: uppercase; font-weight: 400;
  }
  .brand-tagline {
    margin-top: clamp(4px, 0.6vh, 10px);
    font-size: clamp(7px, 0.68vw, 9px);
    letter-spacing: 0.3em; color: var(--text-faint);
    text-transform: uppercase;
  }

  .runway-line {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 1px; z-index: 3;
    background: linear-gradient(90deg,
      transparent 4%, rgba(207,96,16,0.28) 22%,
      rgba(207,96,16,0.62) 50%, rgba(207,96,16,0.28) 78%, transparent 96%);
  }
  .runway-dots {
    position: fixed; bottom: 14px; left: 0; right: 0;
    z-index: 3; display: flex;
    justify-content: center; gap: clamp(18px, 3vw, 54px);
  }
  .rdot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--orange);
    animation: blink 2.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 0.18; } 50% { opacity: 0.82; } }

  .status-bar {
    position: fixed; bottom: clamp(20px, 3.2vh, 40px);
    left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex;
    gap: clamp(16px, 2.8vw, 48px); align-items: center;
    opacity: 0; animation: fadeIn 2s 2s ease forwards;
    white-space: nowrap;
  }
  .sitem {
    display: flex; align-items: center; gap: 6px;
    font-size: clamp(7px, 0.7vw, 10px);
    letter-spacing: 0.24em; color: var(--text-faint);
    text-transform: uppercase;
  }
  .sdot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    animation: blink 2.2s ease-in-out infinite;
  }
  .sdot.g { background: #5FCF72; animation-delay: 0.2s; }
  .sdot.o { background: var(--orange); animation-delay: 0.55s; }
  .sdot.a { background: #FFC107; animation-delay: 0.9s; }

  .scanlines {
    position: fixed; inset: 0; z-index: 25; pointer-events: none;
    background: repeating-linear-gradient(
      180deg, transparent 0 3px, rgba(0,0,0,0.03) 3px 4px);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 760px) {
    .hud { display: none; }
    .ghost-emblem { width: 80vw; }
  }
</style>
</head>

<canvas id="grid-canvas"></canvas>
<div class="atmo"></div>
<div class="runway-line"></div>

  <!-- Text sits below the emblem ring -->
  <div class="logo-text">
    <div class="logo-name">Coywolf</div>
    <div class="logo-avia">Aviation</div>
  </div>

  <div class="brand">
    <div class="brand-sub">Avionics Division</div>
    <div class="brand-tagline">Precision &nbsp;·&nbsp; Reliability &nbsp;·&nbsp; Excellence</div>
  </div>

<div class="runway-dots" id="rdots"></div>

<div class="status-bar">
  <div class="sitem"><div class="sdot g"></div>Systems nominal</div>
  <div class="sitem"><div class="sdot o"></div>Garmin dealer pending</div>
  <div class="sitem"><div class="sdot a"></div>TC approval in progress</div>
  <div class="sitem"><div class="sdot g"></div>Seneca fleet committed</div>
</div>

<div class="scanlines"></div>

<script>
(function () {
  const rdw = document.getElementById('rdots');
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'rdot';
    d.style.animationDelay = (i * 0.18) + 's';
    rdw.appendChild(d);
  }

  const sc = document.getElementById('starfield');
  const sx = sc.getContext('2d');
  let stars = [];
  function initStars() {
    sc.width = window.innerWidth; sc.height = window.innerHeight;
    stars = [];
    const n = Math.floor(sc.width * sc.height / 5400);
    for (let i = 0; i < n; i++) stars.push({
      x: Math.random() * sc.width,
      y: Math.random() * sc.height * 0.78,
      r: Math.random() * 1.5 + 0.15,
      b: Math.random() * 0.65 + 0.1,
      s: Math.random() * 0.005 + 0.002,
      p: Math.random() * Math.PI * 2
    });
  }
  let t = 0;
  function drawStars() {
    sx.clearRect(0, 0, sc.width, sc.height); t += 0.016;
    stars.forEach(s => {
      const a = s.b * (0.52 + 0.48 * Math.sin(t * s.s * 60 + s.p));
      sx.beginPath(); sx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sx.fillStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')'; sx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  const gc = document.getElementById('grid-canvas');
  const gx = gc.getContext('2d');
  function drawGrid() {
    gc.width = window.innerWidth; gc.height = window.innerHeight * 0.52;
    const W = gc.width, H = gc.height, vx = W / 2;
    gx.clearRect(0, 0, W, H);
    [0,0.1,0.2,0.32,0.44,0.5,0.56,0.68,0.8,0.9,1].forEach(f => {
      const g = gx.createLinearGradient(vx, 0, f*W, H);
      g.addColorStop(0, 'rgba(207,96,16,0)');
      g.addColorStop(1, 'rgba(207,96,16,0.09)');
      gx.beginPath(); gx.moveTo(vx,0); gx.lineTo(f*W,H);
      gx.strokeStyle = g; gx.lineWidth = 0.7; gx.stroke();
    });
    [0.88,0.76,0.62,0.44,0.22].forEach(f => {
      gx.beginPath(); gx.moveTo(0,f*H); gx.lineTo(W,f*H);
      gx.strokeStyle = 'rgba(207,96,16,'+(0.03+(1-f)*0.05)+')';
      gx.lineWidth = 0.7; gx.stroke();
    });
  }

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  function tick() {
    const n = new Date();
    document.getElementById('clk').textContent =
      String(n.getHours()).padStart(2,'0')+':'+
      String(n.getMinutes()).padStart(2,'0')+':'+
      String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clk-date').textContent =
      DAYS[n.getDay()]+'  ·  '+MONS[n.getMonth()]+' '+n.getDate()+', '+n.getFullYear();
  }

  let alt=4200, spd=138, hdg=247;
  function hudTick() {
    alt += Math.round((Math.random()-.5)*18);
    spd += Math.round((Math.random()-.5)*2);
    hdg  = ((hdg+Math.round((Math.random()-.5)*1.5))+360)%360;
    document.getElementById('hud-alt').textContent = alt.toLocaleString()+' ft';
    document.getElementById('hud-spd').textContent = spd+' kts';
    document.getElementById('hud-hdg').textContent = String(hdg).padStart(3,'0')+'°';
  }

  function makePlane(sz, yf, delay, dur, flip) {
    const el = document.createElement('div');
    el.style.cssText='position:fixed;z-index:8;opacity:0;pointer-events:none;top:'+(yf*100)+'vh;';
    if (flip) el.style.transform='scaleX(-1)';
    el.innerHTML='<svg width="'+sz+'" height="'+Math.round(sz*.38)+'" viewBox="0 0 70 26" fill="none">'+
      '<path d="M2 13 L26 7 L56 13 L70 11 L56 15 L26 19 L2 13Z" fill="rgba(255,255,255,0.28)"/>'+
      '<path d="M16 13 L30 3 L34 13" fill="rgba(255,255,255,0.22)"/>'+
      '<path d="M16 13 L30 23 L34 13" fill="rgba(255,255,255,0.14)"/>'+
      '<path d="M52 13 L60 9 L62 13 L60 17 L52 13Z" fill="rgba(255,255,255,0.22)"/>'+
      '<circle cx="67" cy="12" r="1.4" fill="rgba(207,96,16,0.9)"/></svg>';
    document.body.appendChild(el);
    function fly() {
      el.style.transition='none'; el.style.left='-10%'; el.style.opacity='0';
      setTimeout(()=>{
        el.style.transition='left '+dur+'ms linear, opacity 1.8s ease';
        el.style.left='110%'; el.style.opacity='0.48';
        setTimeout(()=>{ el.style.opacity='0'; }, dur-2200);
        setTimeout(fly, dur+Math.random()*14000+7000);
      },60);
    }
    setTimeout(fly, delay);
  }

  function onResize() { initStars(); drawGrid(); }
  window.addEventListener('resize', onResize);
  onResize();
  requestAnimationFrame(drawStars);
  tick(); setInterval(tick,1000);
  setInterval(hudTick,3200);
  makePlane(66,0.17,4500,24000,false);
  makePlane(48,0.29,13000,30000,true);
  makePlane(56,0.11,21000,21000,false);
  makePlane(42,0.23,32000,27000,true);
})();
</script>
